<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryRoute - Conquistas</title>
    <link rel="stylesheet" href="../CSS/conquistas.css">
</head>
<body>
    <div class="phone-canvas">
        <main class="scroll-content">
            <header class="page-header">
                <img src="logo.png" alt="MemoryRoute" class="logo-small">
                <p class="eyebrow">O teu progresso</p>
                <h1>Conquistas</h1>
                <p class="progress-message" data-achievement-message></p>
            </header>

            <section class="level-card" aria-label="Nível e moedas">
                <div class="level-icon">★</div>
                <div class="level-content">
                    <span>Nível atual</span>
                    <h2>Nível <strong data-progress-level>1</strong></h2>
                    <div class="level-progress"><div class="level-fill" data-level-fill></div></div>
                    <p>O nível acompanha o teu progresso no MemoryRoute.</p>
                </div>
                <strong><span data-progress-coins>0</span> moedas</strong>
            </section>

            <section class="stats-grid" aria-label="Estatísticas">
                <article><strong data-progress-completed>0</strong><span>Rotas concluídas</span></article>
                <article><strong data-progress-created>0</strong><span>Rotas criadas</span></article>
            </section>

            <section class="achievement-section">
                <div class="section-heading">
                    <h2>Desbloqueadas</h2>
                    <span><strong data-unlocked-count>0</strong> conquistas</span>
                </div>
                <div class="achievement-grid" id="unlocked-achievements"></div>
            </section>

            <section class="achievement-section">
                <div class="section-heading">
                    <h2>Por desbloquear</h2>
                    <span><strong data-locked-count>0</strong> conquistas</span>
                </div>
                <div id="locked-achievements"></div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="index.html" class="nav-item"><span class="nav-icon">⌂</span><span class="nav-label">Início</span></a>
            <a href="rotas.html" class="nav-item"><span class="nav-icon">⌖</span><span class="nav-label">Rotas</span></a>
            <a href="conquistas.html" class="nav-item active"><span class="nav-icon">★</span><span class="nav-label">Conquistas</span></a>
            <a href="perfil.html" class="nav-item"><span class="nav-avatar">A</span><span class="nav-label">Perfil</span></a>
        </nav>
    </div>
    <script type="module" src="../../JS/controllers/authGuard.js"></script>
    <script type="module" src="../../JS/controllers/achievementsController.js"></script>
</body>
</html>
