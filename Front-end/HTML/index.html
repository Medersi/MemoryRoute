<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryRoute - Início</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

    <div class="phone-canvas">
        
        <div class="scroll-content">
            
            <header class="header-container">
                <img src="logo.png" alt="MemoryRoute Logo" class="logo-small">
                <div class="user-welcome">
                    <div class="welcome-text">
                        <h1 data-home-greeting>Olá</h1>
                        <p>Vamos continuar o teu caminho de hoje?</p>
                    </div>
                    <span class="user-avatar avatar-fallback" data-home-avatar aria-label="Perfil do utilizador">A</span>
                </div>
            </header>

            <section class="quick-actions">
                <a href="criar-rota.html" class="action-btn">
                    <div class="action-icon green-icon">➕</div>
                    <div class="action-text">
                        <h3>Criar Caminho</h3>
                        <p>Novo Percurso</p>
                    </div>
                </a>
                <a href="rotas.html" class="action-btn">
                    <div class="action-icon blue-icon">🗺️</div>
                    <div class="action-text">
                        <h3>Minhas rotas</h3>
                        <p>Ver todas</p>
                    </div>
                </a>
                <a href="perfil.html" class="action-btn">
                    <div class="action-icon orange-icon">❓</div>
                    <div class="action-text">
                        <h3>Ajuda</h3>
                        <p>Dicas e suporte</p>
                    </div>
                </a>
            </section>

            <section class="emergency-section">
                <div class="emergency-card">
                    <div class="emergency-icon">📞</div>
                    <div class="emergency-body">
                        <p>Contacto de emergência</p>
                        <button class="btn-emergency">Ligar a contacto de emergência</button>
                    </div>
                </div>
            </section>

        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Início</span>
            </a>
            <a href="rotas.html" class="nav-item">
                <span class="nav-icon">🗺️</span>
                <span class="nav-label">Rotas</span>
            </a>
            <a href="conquistas.html" class="nav-item">
                <span class="nav-icon">🏆</span>
                <span class="nav-label">Conquistas</span>
            </a>
            <a href="perfil.html" class="nav-item">
                <span class="nav-avatar nav-avatar-fallback">A</span>
                <span class="nav-label">Perfil</span>
            </a>
        </nav>

    </div>

    <script type="module" src="../../JS/controllers/authGuard.js"></script>
    <script type="module" src="../../JS/controllers/homeController.js"></script>
</body>
</html>
