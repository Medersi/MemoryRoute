<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryRoute - Login</title>
    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
    <div class="phone-canvas">
        <div class="logo-container">
            <img src="logo.png" alt="MemoryRoute Logo" class="logo-img">
        </div>

        <div class="login-card">
            <h2>Bem-vindo!</h2>

            <form class="login-form" id="login-form">
                <div class="input-group">
                    <label class="sr-only" for="login-email">Email</label>
                    <input id="login-email" name="email" type="email" placeholder="Email" autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label class="sr-only" for="login-password">Palavra-passe</label>
                    <input id="login-password" name="password" type="password" placeholder="Palavra-passe" autocomplete="current-password" required>
                </div>

                <p id="login-message" class="form-message" role="alert" hidden></p>
                <button type="submit" class="btn-login">Entrar</button>
            </form>

            <div class="form-footer">
                <span>Ainda não tens conta?</span>
                <a href="registar.html" class="signup-link">Registar</a>
            </div>
        </div>
    </div>

    <script type="module" src="../../JS/controllers/loginController.js"></script>
</body>
</html>
