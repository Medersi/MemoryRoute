<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryRoute - Preferências de Rota</title>
    <link rel="stylesheet" href="../CSS/perfil.css">
    <link rel="stylesheet" href="../CSS/preferencias.css">
</head>
<body>
    <div class="phone-canvas">
        <main class="scroll-content">
            <header class="sub-header">
                <a href="perfil.html" class="back-button">‹ Voltar</a>
                <h1>Preferências de rota</h1>
                <div class="spacer"></div>
            </header>

            <form id="form-preferencias" class="edit-form">
                
                <div class="input-group">
                    <label for="range-distancia">Distância Máxima (km)</label>
                    <input type="range" id="range-distancia" min="1" max="20" value="5">
                    <span id="valor-distancia">5 km</span>
                </div>

                <div class="input-group">
                    <label for="select-ritmo">Ritmo Preferencial</label>
                    <select id="select-ritmo">
                        <option value="lento">Passeio (Lento)</option>
                        <option value="moderado" selected>Moderado</option>
                        <option value="rapido">Corrida (Rápido)</option>
                    </select>
                </div>

                <div class="input-group-row">
                    <label for="check-acessibilidade">Rota Acessível (Cadeira de rodas / Carrinhos)</label>
                    <input type="checkbox" id="check-acessibilidade">
                </div>

                <button type="submit" class="save-button">Guardar Preferências</button>
            </form>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="index.html" class="nav-item"><span class="nav-icon">⌂</span><span class="nav-label">Início</span></a>
            <a href="rotas.html" class="nav-item"><span class="nav-icon">⌖</span><span class="nav-label">Rotas</span></a>
            <a href="conquistas.html" class="nav-item"><span class="nav-icon">★</span><span class="nav-label">Conquistas</span></a>
            <a href="perfil.html" class="nav-item active"><span class="nav-avatar">A</span><span class="nav-label">Perfil</span></a>
        </nav>
    </div>

    <script type="module" src="../../JS/controllers/authGuard.js"></script>
    <script type="module" src="../../JS/controllers/preferenciasController.js"></script>
</body>
</html>
