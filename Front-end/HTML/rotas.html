<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoryRoute - Rotas</title>
    <link rel="stylesheet" href="../CSS/rotas.css">
</head>
<body>
    <div class="phone-canvas">
        <main class="scroll-content">
            <header class="page-header">
                <img src="logo.png" alt="MemoryRoute" class="logo-small">
                <div class="title-row">
                    <div>
                        <p class="eyebrow">Explorar</p>
                        <h1>As minhas rotas</h1>
                    </div>
                    <a href="criar-rota.html" class="add-route" aria-label="Criar uma nova rota">+</a>
                </div>
            </header>

            <section class="routes-section">
                <div class="section-heading">
                    <h2>Rotas guardadas</h2>
                    <span data-route-count>A carregar...</span>
                </div>

                <div class="filter-list" id="route-filters" aria-label="Filtrar rotas">
                    <button class="filter active" type="button" data-route-filter="all">Todas</button>
                    <button class="filter" type="button" data-route-filter="favorites">Favoritas</button>
                    <button class="filter" type="button" data-route-filter="in_progress">Em progresso</button>
                    <button class="filter" type="button" data-route-filter="completed">Concluídas</button>
                </div>

                <div id="routes-list">
                    <p class="routes-message">A carregar rotas...</p>
                </div>
            </section>
        </main>

        <nav class="bottom-nav" aria-label="Navegação principal">
            <a href="index.html" class="nav-item"><span class="nav-icon">⌂</span><span class="nav-label">Início</span></a>
            <a href="rotas.html" class="nav-item active"><span class="nav-icon">⌖</span><span class="nav-label">Rotas</span></a>
            <a href="conquistas.html" class="nav-item"><span class="nav-icon">★</span><span class="nav-label">Conquistas</span></a>
            <a href="perfil.html" class="nav-item"><span class="nav-avatar">A</span><span class="nav-label">Perfil</span></a>
        </nav>
    </div>
    <script type="module" src="../../JS/controllers/authGuard.js"></script>
    <script type="module" src="../../JS/controllers/routesController.js"></script>
</body>
</html>
